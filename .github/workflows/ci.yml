name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

# Jobs separados para que el step que falle sea legible en la UI de Actions.
# install + test + build + apk(debug) corren en paralelo donde sea posible.
jobs:
  install:
    name: install + cache
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { run_install: false }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Show toolchain
        run: |
          node --version
          pnpm --version
          echo "OS: $(uname -a)"
      - name: Install (workspace)
        run: pnpm install --frozen-lockfile
      - name: Generate Prisma Client
        run: pnpm --filter backend exec prisma generate

  test:
    name: typecheck + tests
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { run_install: false }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter backend exec prisma generate
      - name: Backend typecheck
        run: pnpm --filter backend exec tsc --noEmit
      - name: Frontend typecheck
        run: pnpm --filter frontend exec tsc --noEmit
      - name: Backend tests (Vitest)
        run: pnpm --filter backend exec vitest run

  build-pwa:
    name: build PWA
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { run_install: false }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter frontend build
      - uses: actions/upload-artifact@v4
        with:
          name: pwa-dist
          path: frontend/dist
          retention-days: 30

  build-apk-debug:
    name: build Android APK debug
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: android-actions/setup-android@v3
        with: { log-accepted-android-sdk-licenses: false }

      - name: Install mobile deps (flat layout)
        working-directory: mobile
        run: npm install --no-package-lock --legacy-peer-deps

      - name: Bundle legacy HTML into Android assets
        working-directory: mobile
        run: node scripts/copy-legacy.mjs

      - name: Gradle assembleDebug
        working-directory: mobile/android
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon assembleDebug

      - name: Locate APK
        run: |
          APK=$(find mobile/android/app/build/outputs/apk -name '*.apk' | head -1)
          echo "Found: $APK"
          ls -la "$APK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: qary-android-debug
          path: mobile/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

  build-apk-release:
    name: build Android APK release (standalone)
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: android-actions/setup-android@v3
        with: { log-accepted-android-sdk-licenses: false }

      - name: Install mobile deps (flat layout)
        working-directory: mobile
        run: npm install --no-package-lock --legacy-peer-deps

      - name: Bundle legacy HTML into Android assets
        working-directory: mobile
        run: node scripts/copy-legacy.mjs

      # Release usa signingConfigs.debug (configurado por Expo en build.gradle):
      # APK firmado con la debug.keystore commiteada → instalable en Android sin
      # secrets adicionales. Para Play Store hay que rotar a una keystore real.
      - name: Gradle assembleRelease
        working-directory: mobile/android
        env:
          # Asegura que el JS se agrupe (no debuggable). RN gradle plugin lo hace
          # automáticamente fuera de debug variants.
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon assembleRelease

      - name: Locate release APK
        run: |
          APK=$(find mobile/android/app/build/outputs/apk/release -name '*.apk' | head -1)
          echo "Found release APK: $APK"
          ls -la "$APK"
          file "$APK" || true

      - name: Rename for clarity
        run: |
          cd mobile/android/app/build/outputs/apk/release
          for f in *.apk; do
            cp "$f" "qary-superapp-release.apk"
          done
          ls -la

      - name: Upload APK release artifact
        uses: actions/upload-artifact@v4
        with:
          name: qary-android-release
          path: mobile/android/app/build/outputs/apk/release/qary-superapp-release.apk
          if-no-files-found: error
          retention-days: 90
