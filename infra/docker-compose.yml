services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: qary
      POSTGRES_PASSWORD: qary
      POSTGRES_DB: qary
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qary"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes: [miniodata:/data]

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  coturn:
    image: coturn/coturn:latest
    network_mode: host
    command: >
      -n
      --lt-cred-mech
      --realm=qary.local
      --user=qary:qary
      --no-tls
      --no-dtls
      --listening-port=3478

volumes:
  pgdata:
  miniodata:
